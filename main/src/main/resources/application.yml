spring.application.name: scarlett_notification_service
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/scarlett_notification
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
    hibernate:
      ddl-auto: create-drop